async function hdFsGet(docName) {
  try {
    const res = await fetch(`${_HD_FS_BASE}/${docName}?key=${_HD_FB_KEY}`);
    if (!res.ok) return null;
    const doc = await res.json();
    const raw = doc.fields?.data?.stringValue;
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

async function hdFsSet(docName, value) {
  try {
    const body = {
      fields: {
        data:      { stringValue: JSON.stringify(value) },
        updatedAt: { integerValue: String(Date.now()) }

    await fetch(

async function fetchGPSDevices() {
  const gpsKey = localStorage.getItem('HEIMDALL_API_KEY') || '';

  // 1st choice: direct OneStepGPS (API key in URL = simple GET = no CORS preflight)
  if (gpsKey) {
    try {
      const [devRes, grpRes] = await Promise.all([
        fetch(`https://track.onestepgps.com/v3/api/public/device?latest_point=true&api-key=${gpsKey}`),
        fetch(`https://track.onestepgps.com/v3/api/public/group?api-key=${gpsKey}`).catch(() => null)
      ]);
      if (devRes.ok) {
        const devData = await devRes.json();
        let groupNameMap = {};
        if (grpRes && grpRes.ok) {
          try {
            const grpData = await grpRes.json();
            const groups = grpData.result_list || grpData.groups || (Array.isArray(grpData) ? grpData : []);
            groups.forEach(g => {
              if (g.group_id != null) groupNameMap[String(g.group_id)] = g.group_name || g.name || String(g.group_id);
            });
          } catch(e) {}
        }
        const devices = (devData.result_list || []).map(dev => {
          let names = [];
          const g = dev.groups || dev.group_ids || dev.group_id;
          if (Array.isArray(g)) {
            names = g.map(x => {
              if (typeof x === 'string' || typeof x === 'number') return groupNameMap[String(x)] || String(x);
              return x.group_name || x.name || groupNameMap[String(x.group_id)] || null;
            }).filter(Boolean);
          } else if (g != null) {
            names = [groupNameMap[String(g)] || String(g)];
          }
          return Object.assign({}, dev, { _groupNames: names.length ? names : ['Ungrouped Devices'] });
        });
        return Object.assign({}, devData, { result_list: devices, _groupMap: groupNameMap });
      } else {
        console.warn('[GPS] Direct API returned', devRes.status);
      }
    } catch(e) { console.warn('[GPS] Direct API error:', e.message); }
  }

  // 2nd choice: Netlify function (server-side proxy)
  try {
    const r = await fetch('/.netlify/functions/gps-proxy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ apiKey: gpsKey })
    });
    if (r.ok) {
      const d = await r.json();
      if (d && Array.isArray(d.result_list)) return d;
    } else {
      console.warn('[GPS] Netlify proxy returned', r.status);
    }
  } catch(e) { console.warn('[GPS] Netlify proxy error:', e.message); }

  // 3rd choice: Railway proxy
  try {
    const r2 = await fetch(`${RAILWAY_BASE}/gps/devices`, {
      headers: gpsKey ? { 'x-gps-key': gpsKey } : {}
    });
    if (r2.ok) {
      const d2 = await r2.json();
      if (d2 && Array.isArray(d2.result_list)) return d2;
    } else {
      console.warn('[GPS] Railway proxy returned', r2.status);
    }
  } catch(e) { console.warn('[GPS] Railway proxy error:', e.message); }

  throw new Error('GPS fetch failed — all endpoints unavailable');
}

// ─── CLAUDE API ───────────────────────────────────────────────────────────────
async function callClaude(messages, maxTokens = 4096) {
  const res = await fetch('/.netlify/functions/claude-proxy', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-opus-4-6',
      max_tokens: maxTokens,
      messages
    })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.message || data.error || 'Claude API error');
  if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  return data.content[0].text;
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function fileToPreviewURL(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(file);
  });
}

// Haversine distance in miles between two lat/lng points
function haversineMiles(lat1, lon1, lat2, lon2) {
  const R = 3958.8;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

// Geocode an address → { lat, lon } using Nominatim (cached in localStorage)
async function geocodeAddress(address) {
  if (!address) return null;
  const cacheKey = 'hd_geo_' + address.trim().toLowerCase().replace(/\s+/g, '_');
  const cached = localStorage.getItem(cacheKey);
  if (cached) { try { return JSON.parse(cached); } catch(e) {} }
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&limit=1`,
      { headers: { 'Accept-Language': 'en', 'User-Agent': 'DMCApp/1.0' } }
    );
    const data = await res.json();
    if (!data.length) return null;
    const result = { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
    localStorage.setItem(cacheKey, JSON.stringify(result));
    return result;
  } catch(e) { return null; }
}

// Extract GPS coords from a photo file using exifr
async function getPhotoGPS(file) {
  try {
    if (!window.exifr) return null;
    const gps = await window.exifr.gps(file);
    if (!gps || !gps.latitude || !gps.longitude) return null;
    return { lat: gps.latitude, lon: gps.longitude };
  } catch(e) { return null; }
}

// Given a photo GPS and job address, return { distanceMiles, onSite, noGps }
async function checkPhotoLocation(file, jobAddress) {
  const photoGps = await getPhotoGPS(file);
  if (!photoGps) return { noGps: true, distanceMiles: null, onSite: null };
  if (!jobAddress) return { noGps: false, distanceMiles: null, onSite: null };
  const jobGps = await geocodeAddress(jobAddress);
  if (!jobGps) return { noGps: false, distanceMiles: null, onSite: null };
  const distanceMiles = haversineMiles(photoGps.lat, photoGps.lon, jobGps.lat, jobGps.lon);
  return { noGps: false, distanceMiles, onSite: distanceMiles <= 0.5, photoGps, jobGps };
}

                className="bg-yellow-400 text-black font-semibold text-xs px-3 py-1.5 rounded hover:bg-yellow-300 transition-colors"
              >
                ↗ Push Estimates to Pricing Sheet
              </button>
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ─── EQUIPMENT MAP ────────────────────────────────────────────────────────────

function EquipmentMap({ devices, getDeviceName, getDeviceEquipNum, getDeviceStatus, getDeviceAddress, getDeviceUpdated, jobSites = [] }) {
  const mapRef = React.useRef(null);
  const leafletRef = React.useRef(null);
  const markersRef = React.useRef([]);
  const jobMarkersRef = React.useRef([]);
  const geocacheRef = React.useRef({});

  React.useEffect(() => {
    if (!mapRef.current || leafletRef.current) return;
    const map = L.map(mapRef.current, {
      center: [35.5, -80.8],
      zoom: 9,
      zoomControl: true,
      attributionControl: false
    });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19
    }).addTo(map);
    leafletRef.current = map;
    return () => { map.remove(); leafletRef.current = null; };
  }, []);

  React.useEffect(() => {
    const map = leafletRef.current;
    if (!map) return;
    // Clear old markers
    markersRef.current.forEach(m => m.remove());
    markersRef.current = [];

    const validDevices = devices.filter(d => {
      const pt = d.latest_device_point;
      return pt && pt.lat && pt.lng;
    });

    if (!validDevices.length) return;

    const bounds = [];
    validDevices.forEach(dev => {
      const pt = dev.latest_device_point;
      const lat = parseFloat(pt.lat), lng = parseFloat(pt.lng);
      const st = getDeviceStatus(dev);
      const isMoving = st.label && st.label.startsWith('Moving');
      const name = getDeviceName(dev);
      const num  = getDeviceEquipNum(dev);
      const addr = getDeviceAddress(dev);
      const updated = getDeviceUpdated(dev);
      const spd = parseFloat(pt.speed) || 0;

      const icon = L.divIcon({
        className: '',
        html: `<div class="eq-marker-pin${isMoving ? ' moving' : ''}"></div>`,
        iconSize: [14, 14],
        iconAnchor: [7, 7],
        popupAnchor: [0, -10]
      });

      const popupHtml = `<div class="eq-popup" style="padding:10px 12px;min-width:180px;">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:#f5c518;margin-bottom:4px;">
          ${num ? num + ' · ' : ''}${name}
        </div>
        <div style="font-size:9px;color:${isMoving ? '#5ab4f5' : '#7ecb8f'};margin-bottom:4px;">
          ● ${st.label}${spd > 2 ? '' : ''}
        </div>
        ${addr ? `<div style="font-size:9px;color:#9b9488;margin-bottom:2px;">${addr}</div>` : ''}
        ${updated ? `<div style="font-size:8px;color:#9b9488;">Updated: ${updated}</div>` : ''}
      </div>`;

      const marker = L.marker([lat, lng], { icon })
        .addTo(map)
        .bindPopup(popupHtml, { className: 'eq-popup-wrap', maxWidth: 240 });

      markersRef.current.push(marker);
      bounds.push([lat, lng]);
    });

    if (bounds.length === 1) {
      map.setView(bounds[0], 13);
    } else if (bounds.length > 1) {
      map.fitBounds(bounds, { padding: [40, 40], maxZoom: 13 });
    }
  }, [devices]);

  // Job site markers — geocode location strings and place purple diamond pins
  React.useEffect(() => {
    const map = leafletRef.current;
    if (!map) return;
    // Clear old job markers
    jobMarkersRef.current.forEach(m => m.remove());
    jobMarkersRef.current = [];
    if (!jobSites || jobSites.length === 0) return;

    jobSites.forEach(async (site) => {
      const loc = (site.location || '').trim();
      if (!loc) return;
      // Geocode (with cache)
      let coords = geocacheRef.current[loc];
      if (!coords) {
        try {
          const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(loc)}&format=json&limit=1`);
          const data = await r.json();
          if (data && data[0]) {
            coords = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
            geocacheRef.current[loc] = coords;
          }
        } catch(e) { return; }
      }
      if (!coords) return;
      const icon = L.divIcon({
        className: '',
        html: `<div class="job-site-pin"></div>`,
        iconSize: [14, 14],
        iconAnchor: [7, 7],
        popupAnchor: [0, -12]
      });
      const eqList = (site.onSiteEquipment || []).map(e => e.name || e.type).filter(Boolean);
      const popupHtml = `<div class="eq-popup" style="padding:10px 12px;min-width:190px;">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:#a78bfa;margin-bottom:4px;">
          📍 ${site.jobName || site.jobNum || 'Job Site'}
        </div>
        ${site.jobNum && site.jobName ? `<div style="font-size:9px;color:#9b9488;margin-bottom:4px;">${site.jobNum}</div>` : ''}
        <div style="font-size:9px;color:#c4b5fd;margin-bottom:5px;">${loc}</div>
        ${eqList.length ? `<div style="font-size:8px;color:#9b9488;margin-bottom:3px;letter-spacing:0.5px;text-transform:uppercase;">Equipment on site:</div>
        <div style="display:flex;flex-wrap:wrap;gap:3px;">
          ${eqList.map(e => `<span style="background:rgba(167,139,250,0.15);border:1px solid rgba(167,139,250,0.3);border-radius:3px;padding:1px 5px;font-size:8px;color:#c4b5fd;">${e}</span>`).join('')}
        </div>` : ''}
      </div>`;
      const marker = L.marker([coords.lat, coords.lng], { icon })
        .addTo(map)
        .bindPopup(popupHtml, { className: 'eq-popup-wrap', maxWidth: 240 });
      jobMarkersRef.current.push(marker);
    });
  }, [jobSites]);

  return (
    <div ref={mapRef} style={{
      width: '100%', height: '578px',
      borderRadius: 'var(--radius-lg)',
      border: '1px solid var(--asphalt-light)',
      overflow: 'hidden',
      position: 'relative'
    }} />
  );
}

// ─── DAILY HAUL WIDGET ────────────────────────────────────────────────────────

function DailyHaulWidget({ driverKey }) {
  const STORAGE_KEY   = 'dmc_haul_assignment';
  const TICKETS_KEY   = 'dmc_haul_tickets';
  const TONS_PER_LOAD = 22.5;

  const readAssign  = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { return {}; } };
  const writeAssign = (obj) => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(obj)); } catch(e) {} };
  const readTickets = () => { try { return JSON.parse(localStorage.getItem(TICKETS_KEY) || '[]'); } catch(e) { return []; } };
  const writeTickets = (arr) => { try { localStorage.setItem(TICKETS_KEY, JSON.stringify(arr)); } catch(e) {} };

  const todayStr = () => { const d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
  const nowTime  = () => { const d = new Date(); let h=d.getHours(), m=d.getMinutes(), ampm=h>=12?'PM':'AM'; h=h%12||12; return h+':'+(m<10?'0':'')+m+' '+ampm; };

  const BLANK  = { foreman:'', jobNum:'', gcName:'', projectName:'', plantName:'', plantLocation:'', loadTime:'', projectedTonnage:'' };
  const SAMPLE = { foreman:'Mike Carreiro', jobNum:'DMC-2026-047', gcName:'Gilbane Building Company', projectName:'Route 9 Corridor Repaving — Phase 2', plantName:'P.J. Keating Asphalt Plant', plantLocation:'174 Peckham St, Raynham, MA 02767', loadTime:'6:30 AM', projectedTonnage:'247.5' };
  const TICKET_BLANK = { ticketNum:'', timeLoaded:'', mixType:'', actualTonnage:'', truckNum:'', mixTemp:'', notes:'', slipPhoto:null };

  const [open,         setOpen]         = React.useState(false);
  const [editing,      setEditing]      = React.useState(false);
  const [draft,        setDraft]        = React.useState(BLANK);
  const [saved,        setSaved]        = React.useState(() => { const r = readAssign()[driverKey]; return (r && Object.values(r).some(v=>v)) ? r : SAMPLE; });
  const [tickets,      setTickets]      = React.useState(() => readTickets().filter(t => t.driverKey === driverKey && t.date === todayStr()));
  const [showForm,     setShowForm]     = React.useState(false);
  const [ticketDraft,  setTicketDraft]  = React.useState(TICKET_BLANK);
  const [viewSlip,     setViewSlip]     = React.useState(null); // base64 photo to preview
  const slipPhotoRef = React.useRef(null);

  const projLoads   = saved.projectedTonnage ? Math.round(parseFloat(saved.projectedTonnage) / TONS_PER_LOAD) : null;
  const loadsLogged = tickets.length;

  const startEdit  = () => { setDraft({ ...BLANK, ...saved }); setEditing(true); };
  const cancelEdit = () => setEditing(false);
  const saveEdit   = () => {
    const all = readAssign(); all[driverKey] = { ...draft }; writeAssign(all);
    setSaved({ ...draft }); setEditing(false);
  };

  const openTicketForm = () => {
    setTicketDraft({ ...TICKET_BLANK, timeLoaded: nowTime(), loadNum: tickets.length + 1 });
    setShowForm(true);
  };

  const submitTicket = () => {
    const newTicket = {
      id: Date.now() + '_' + Math.random().toString(36).slice(2,7),
      driverKey,
      date:     todayStr(),
      loadNum:  tickets.length + 1,
      jobNum:   saved.jobNum || '',
      jobName:  saved.projectName || '',
      ...ticketDraft,
      timestamp: Date.now(),
    };
    // Persist to all-tickets list
    const all = readTickets();
    all.push(newTicket);
    writeTickets(all);
    // Append slip photo to job records if jobNum exists
    if (newTicket.jobNum && newTicket.slipPhoto) {
      try {
        const jobSlips = JSON.parse(localStorage.getItem('dmc_mix_slips') || '{}');
        if (!jobSlips[newTicket.jobNum]) jobSlips[newTicket.jobNum] = [];
        jobSlips[newTicket.jobNum].push({ ticketId: newTicket.id, loadNum: newTicket.loadNum, photo: newTicket.slipPhoto, timestamp: newTicket.timestamp, driver: driverKey });
        localStorage.setItem('dmc_mix_slips', JSON.stringify(jobSlips));
      } catch(e) {}
    }
    const todayTickets = all.filter(t => t.driverKey === driverKey && t.date === todayStr());
    setTickets(todayTickets);
    setShowForm(false);
    setTicketDraft(TICKET_BLANK);
  };

  const FIELDS = [
    { key:'foreman',          label:'Foreman'          },
    { key:'jobNum',           label:'Job #'             },
    { key:'gcName',           label:'GC Name'           },
    { key:'projectName',      label:'Project Name'      },
    { key:'plantName',        label:'Plant Name'        },
    { key:'plantLocation',    label:'Plant Location'    },
    { key:'loadTime',         label:'Load Time'         },
    { key:'projectedTonnage', label:'Projected Tonnage' },
  ];
  const hasData = FIELDS.some(f => saved[f.key]);

  const INPUT_STYLE = { width:'100%', boxSizing:'border-box', background:'var(--asphalt)', border:'1px solid var(--asphalt-light)', borderRadius:'5px', color:'var(--white)', fontFamily:"'DM Mono',monospace", fontSize:'10px', padding:'5px 8px', outline:'none' };

    <>
    {/* ── Mix Slip photo preview overlay ── */}

      <div onClick={() => setViewSlip(null)} style={{position:'fixed',inset:0,zIndex:9900,background:'rgba(0,0,0,0.88)',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <img src={viewSlip} style={{maxWidth:'92vw',maxHeight:'88vh',borderRadius:'8px',boxShadow:'0 0 40px rgba(0,0,0,0.8)'}} />
        <button onClick={() => setViewSlip(null)} style={{position:'absolute',top:'16px',right:'16px',background:'rgba(0,0,0,0.6)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:'6px',color:'#fff',fontSize:'16px',padding:'6px 12px',cursor:'pointer'}}>✕</button>
      </div>
    )}

    {/* ── Load Ticket form modal ── */}
    {showForm && (
      <div style={{position:'fixed',inset:0,zIndex:9800,background:'rgba(0,0,0,0.78)',display:'flex',alignItems:'center',justifyContent:'center',padding:'12px'}}>
        <div style={{width:'min(480px,100%)',background:'#1e1e1e',borderRadius:'12px',border:'1px solid rgba(126,203,143,0.3)',boxShadow:'0 20px 60px rgba(0,0,0,0.8)',display:'flex',flexDirection:'column',maxHeight:'92vh',overflow:'hidden'}}>
          {/* Modal header */}
          <div style={{padding:'14px 18px',borderBottom:'1px solid rgba(126,203,143,0.15)',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
            <div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'18px',letterSpacing:'2px',color:'#7ecb8f'}}>🧾 Load Ticket — Load {tickets.length + 1}</div>
              {saved.jobNum && <div style={{fontFamily:"'DM Mono',monospace",fontSize:'9px',color:'rgba(155,148,136,0.6)',marginTop:'2px'}}>{saved.projectName || saved.jobNum}</div>}
            </div>
            <button onClick={() => setShowForm(false)} style={{background:'none',border:'1px solid rgba(155,148,136,0.3)',borderRadius:'5px',color:'var(--concrete-dim)',fontSize:'14px',padding:'4px 8px',cursor:'pointer'}}>✕</button>
          </div>

          {/* Form body */}
          <div style={{overflowY:'auto',padding:'16px 18px',display:'flex',flexDirection:'column',gap:'10px'}}>
            {[
              { key:'ticketNum',     label:'Ticket #',        type:'text',   ph:'Plant ticket number' },
              { key:'timeLoaded',    label:'Time Loaded',     type:'text',   ph:'e.g. 7:15 AM' },
              { key:'mixType',       label:'Mix Type / Design', type:'text', ph:'e.g. 9.5mm Superpave' },
              { key:'actualTonnage', label:'Actual Tonnage',  type:'number', ph:'tons' },
              { key:'truckNum',      label:'Truck #',         type:'text',   ph:'e.g. T-14' },
              { key:'mixTemp',       label:'Mix Temp (°F)',   type:'number', ph:'°F' },
            ].map(f => (
              <div key={f.key}>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:'7px',color:'rgba(155,148,136,0.6)',letterSpacing:'1px',textTransform:'uppercase',marginBottom:'3px'}}>{f.label}</div>
                <input type={f.type} value={ticketDraft[f.key]||''} placeholder={f.ph}

          ) : (

            <div>
              {hasData && (

                  {FIELDS.map(f => saved[f.key] ? (
                    <div key={f.key} style={{display:'flex',alignItems:'baseline',gap:'6px'}}>

                      <span style={{fontFamily:"'DM Mono',monospace",fontSize:'10px',color:'var(--white)',flex:1}}>{saved[f.key]}{f.key==='projectedTonnage'?' t':''}</span>
                    </div>
                  ) : null)}

                  {/* Projected loads + add button */}

                      <span style={{fontFamily:"'DM Mono',monospace",fontSize:'9px',color:'rgba(155,148,136,0.6)',textTransform:'uppercase',letterSpacing:'1px'}}>Projected Loads</span>
                      <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                        <span style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',color:'rgba(155,148,136,0.4)'}}>{loadsLogged}/{projLoads}</span>
                        <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'22px',letterSpacing:'2px',color:'#5ab4f5'}}>{projLoads}</span>
                      </div>
                      <button onClick={e => { e.stopPropagation(); openTicketForm(); }}
                        title="Log a load ticket"
                        style={{width:'30px',height:'30px',borderRadius:'50%',background:'rgba(126,203,143,0.18)',border:'2px solid rgba(126,203,143,0.55)',color:'#7ecb8f',fontSize:'18px',lineHeight:1,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontWeight:700}}>
                        +
                      </button>
                    </div>
                  )}
                </div>
              )}

              {/* Logged tickets */}
              {tickets.length > 0 && (
                <div style={{marginBottom:'10px'}}>
                  <div style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',color:'rgba(155,148,136,0.5)',letterSpacing:'1px',textTransform:'uppercase',marginBottom:'5px'}}>Today's Load Log</div>
                  <div style={{display:'flex',flexDirection:'column',gap:'5px'}}>
                    {tickets.map((t, i) => (
                      <div key={t.id} style={{background:'rgba(126,203,143,0.05)',border:'1px solid rgba(126,203,143,0.18)',borderRadius:'6px',padding:'7px 9px',display:'flex',alignItems:'center',gap:'8px'}}>
                        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'16px',color:'#7ecb8f',lineHeight:1,flexShrink:0}}>#{t.loadNum}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontFamily:"'DM Mono',monospace",fontSize:'9px',color:'var(--white)',display:'flex',gap:'8px',flexWrap:'wrap'}}>
                            {t.timeLoaded && <span>⏱ {t.timeLoaded}</span>}
                            {t.actualTonnage && <span>⚖ {t.actualTonnage}t</span>}
                            {t.mixType && <span style={{color:'rgba(155,148,136,0.7)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'120px'}}>{t.mixType}</span>}
                          </div>
                          {t.ticketNum && <div style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',color:'rgba(155,148,136,0.5)',marginTop:'2px'}}>Ticket #{t.ticketNum}{t.truckNum ? ' · Truck '+t.truckNum : ''}</div>}
                        </div>
                        {t.slipPhoto && (
                          <img src={t.slipPhoto} onClick={() => setViewSlip(t.slipPhoto)}
                            style={{width:'38px',height:'38px',objectFit:'cover',borderRadius:'4px',border:'1px solid rgba(126,203,143,0.25)',cursor:'zoom-in',flexShrink:0}} />
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {!hasData && (
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:'10px',color:'rgba(155,148,136,0.4)',textAlign:'center',padding:'12px 0'}}>No haul assignment set for today.</div>
              )}

              <button onClick={e => { e.stopPropagation(); startEdit(); }}
                style={{width:'100%',padding:'5px 0',background:'rgba(245,197,24,0.08)',border:'1px solid rgba(245,197,24,0.3)',borderRadius:'5px',color:'var(--stripe)',fontFamily:"'DM Mono',monospace",fontSize:'9px',fontWeight:700,cursor:'pointer'}}>
                ✏️ {hasData ? 'Edit Assignment' : 'Set Assignment'}
              </button>
            </div>
          )}
        </div>
      )}
    </div>
    </>
  );
}

// ─── FLEET WIDGET (dashboard sidebar — status + notes editing) ───────────────

function FleetWidget({ onFleetChange, defaultOpen = false }) {
  const [items,        setItems]        = React.useState(() => { try { return JSON.parse(localStorage.getItem('dmc_fleet')||'[]').filter(e=>e.active!==false); } catch(e){return [];} });
  const [search,       setSearch]       = React.useState('');
  const [expanded,     setExpanded]     = React.useState(null);
  const [noteVal,      setNoteVal]      = React.useState('');
  const [saving,       setSaving]       = React.useState(null);
  const [open,         setOpen]         = React.useState(defaultOpen);
  const [statusFilter, setStatusFilter] = React.useState('all');  // all | operational | limping | maintenance | down
  const [groupBy,      setGroupBy]      = React.useState('none'); // none | location | category | status
  const [sortBy,       setSortBy]       = React.useState('name'); // name | status | location

  const TYPE_ICONS = { paver:'🛣️', roller:'🛞', milling:'⛏️', excavator:'🦾', loader:'🔄',
    skid_steer:'🟡', compactor:'⚙️', dump_truck:'🚚', lowbed:'🚛', tack_truck:'🛢️', tack_wagon:'🛢️',
    rubber_machine:'🟠', water_truck:'💧', mtv:'🔁', grader:'🏗️', generator:'⚡', trailer:'🔗', other:'📦' };

  const statusInfo = (s) => {
    if (s === 'down')        return { label:'DOWN',        color:'#d94f3d', bg:'rgba(217,79,61,0.14)'   };
    if (s === 'limping')     return { label:'LIMPING',     color:'#e8813a', bg:'rgba(232,129,58,0.14)'  };
    if (s === 'maintenance') return { label:'MAINT.',      color:'#a05af0', bg:'rgba(160,90,240,0.14)'  };
    return                          { label:'OPERATIONAL', color:'#7ecb8f', bg:'rgba(61,158,106,0.12)'  };
  };

  const saveItem = (id, patch) => {
    setSaving(id);
    try {
      const all = JSON.parse(localStorage.getItem('dmc_fleet')||'[]');
      const idx = all.findIndex(e => e.id === id);
      if (idx !== -1) {
        all[idx] = { ...all[idx], ...patch };
        localStorage.setItem('dmc_fleet', JSON.stringify(all));
        const active = all.filter(e => e.active !== false);
        setItems(active);
        if (onFleetChange) onFleetChange(active);
      }
    } catch(e) {}
    setTimeout(() => setSaving(null), 600);
  };

  const STATUS_OPTS = [
    { value: 'operational', label: 'Operational', color: '#7ecb8f' },
    { value: 'limping',     label: 'Limping',     color: '#e8813a' },
    { value: 'maintenance', label: 'Maintenance', color: '#a05af0' },
    { value: 'down',        label: 'Down',        color: '#d94f3d' },
  ];

  const downCount  = items.filter(e => e.status === 'down').length;
  const limpCount  = items.filter(e => e.status === 'limping').length;
  const maintCount = items.filter(e => e.status === 'maintenance').length;

  const STATUS_ORDER = { down:0, limping:1, maintenance:2, operational:3 };
  const q = search.trim().toLowerCase();
  let filtered = items;
  if (statusFilter !== 'all') {
    filtered = statusFilter === 'operational'
      ? filtered.filter(e => !['down','limping','maintenance'].includes(e.status))
      : filtered.filter(e => e.status === statusFilter);
  }
  if (q) filtered = filtered.filter(e =>
    (e.name||'').toLowerCase().includes(q) ||
    (e.id||'').toLowerCase().includes(q) ||
    (e.assignedJobName||'').toLowerCase().includes(q) ||
    (e.category||'').toLowerCase().includes(q)
  );
  filtered = [...filtered].sort((a,b) => {
    if (sortBy === 'status')   return (STATUS_ORDER[a.status||'operational']||3) - (STATUS_ORDER[b.status||'operational']||3);
    if (sortBy === 'location') return (a.assignedJobName||'zzz').localeCompare(b.assignedJobName||'zzz');
    return (a.name||a.id||'').localeCompare(b.name||b.id||'');
  });

  // Group the sorted list
  let groupedEntries = null;
  if (groupBy !== 'none') {
    const map = {};
    filtered.forEach(eq => {
      let g;
      if (groupBy === 'location') g = eq.assignedJobName ? '📍 '+eq.assignedJobName : '🏭 At Shop / Yard';
      else if (groupBy === 'category') g = eq.category ? eq.category.toUpperCase() : 'UNCATEGORIZED';
      else g = statusInfo(eq.status).label;
      if (!map[g]) map[g] = [];
      map[g].push(eq);
    });
    groupedEntries = Object.entries(map);
  }

  return (
    <div style={{background:'var(--asphalt-mid)',borderRadius:'8px',border:'1px solid var(--asphalt-light)',overflow:'hidden',display:'flex',flexDirection:'column',maxHeight: open ? 'calc(100vh - 180px)' : 'auto'}}>
      {/* Header — always visible, click to toggle */}
      <div onClick={() => setOpen(v => !v)} style={{padding:'10px 12px',borderBottom: open ? '1px solid var(--asphalt-light)' : 'none',flexShrink:0,cursor:'pointer',userSelect:'none'}}>
        <div style={{display:'flex',alignItems:'center',gap:'7px',flexWrap:'wrap'}}>
          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'14px',letterSpacing:'2px',color:'var(--stripe)'}}>🔧 Fleet Status</span>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',color:'#7ecb8f',background:'rgba(126,203,143,0.1)',border:'1px solid rgba(126,203,143,0.25)',borderRadius:'8px',padding:'1px 6px'}}>{items.length} units</span>
          {downCount > 0  && <span style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',color:'#d94f3d',background:'rgba(217,79,61,0.1)',border:'1px solid rgba(217,79,61,0.25)',borderRadius:'8px',padding:'1px 6px'}}>{downCount} DOWN</span>}
          {limpCount > 0  && <span style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',color:'#e8813a',background:'rgba(232,129,58,0.1)',border:'1px solid rgba(232,129,58,0.25)',borderRadius:'8px',padding:'1px 6px'}}>{limpCount} LIMPING</span>}
          {maintCount > 0 && <span style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',color:'#a05af0',background:'rgba(160,90,240,0.1)',border:'1px solid rgba(160,90,240,0.25)',borderRadius:'8px',padding:'1px 6px'}}>{maintCount} MAINT.</span>}
          <span style={{marginLeft:'auto',fontFamily:"'DM Mono',monospace",fontSize:'9px',color:'rgba(155,148,136,0.4)'}}>{open ? '▲' : '▾'}</span>
        </div>
      </div>

      {open && <>
        {/* Toolbar */}
        <div style={{padding:'7px 12px',borderBottom:'1px solid var(--asphalt-light)',flexShrink:0,display:'flex',flexDirection:'column',gap:'6px'}} onClick={e=>e.stopPropagation()}>
          {/* Search */}
          <input type="text" placeholder="Search equipment…"
            value={search} onChange={e => setSearch(e.target.value)}
            style={{width:'100%',boxSizing:'border-box',background:'var(--asphalt)',border:'1px solid var(--asphalt-light)',borderRadius:'5px',
              color:'var(--white)',fontFamily:"'DM Mono',monospace",fontSize:'10px',padding:'5px 8px',outline:'none'}} />

          {/* Status filter pills */}
          <div style={{display:'flex',gap:'3px',flexWrap:'wrap'}}>
            {[
              { k:'all',          label:'All',     color:'var(--concrete-dim)', active:'var(--stripe)',    bg:'rgba(245,197,24,0.1)',    border:'rgba(245,197,24,0.4)'    },
              { k:'operational',  label:'OK',      color:'var(--concrete-dim)', active:'#7ecb8f',          bg:'rgba(126,203,143,0.1)',   border:'rgba(126,203,143,0.4)'   },
              { k:'limping',      label:'Limping', color:'var(--concrete-dim)', active:'#e8813a',          bg:'rgba(232,129,58,0.1)',    border:'rgba(232,129,58,0.4)'    },
              { k:'maintenance',  label:'Maint.',  color:'var(--concrete-dim)', active:'#a05af0',          bg:'rgba(160,90,240,0.1)',    border:'rgba(160,90,240,0.4)'    },
              { k:'down',         label:'Down',    color:'var(--concrete-dim)', active:'#d94f3d',          bg:'rgba(217,79,61,0.1)',     border:'rgba(217,79,61,0.4)'     },
            ].map(p => (
              <button key={p.k} onClick={() => setStatusFilter(p.k)}
                style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',fontWeight:700,padding:'2px 8px',borderRadius:'10px',cursor:'pointer',whiteSpace:'nowrap',
                  background: statusFilter===p.k ? p.bg : 'var(--asphalt)',
                  border: '1px solid '+(statusFilter===p.k ? p.border : 'var(--asphalt-light)'),
                  color: statusFilter===p.k ? p.active : p.color}}>
                {p.label}
              </button>
            ))}
          </div>

          {/* Sort + Group row */}
          <div style={{display:'flex',gap:'6px',alignItems:'center'}}>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:'7px',color:'rgba(155,148,136,0.4)',letterSpacing:'1px',textTransform:'uppercase',flexShrink:0}}>Sort</span>
            {[{k:'name',label:'Name'},{k:'status',label:'Status'},{k:'location',label:'Location'}].map(s => (
              <button key={s.k} onClick={() => setSortBy(s.k)}
                style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',padding:'2px 7px',borderRadius:'4px',cursor:'pointer',
                  background: sortBy===s.k ? 'var(--asphalt-light)' : 'var(--asphalt)',
                  border: '1px solid '+(sortBy===s.k ? 'var(--stripe)' : 'var(--asphalt-light)'),
                  color: sortBy===s.k ? 'var(--stripe)' : 'var(--concrete-dim)',fontWeight: sortBy===s.k ? 700 : 400}}>
                {s.label}
              </button>
            ))}
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:'7px',color:'rgba(155,148,136,0.4)',letterSpacing:'1px',textTransform:'uppercase',flexShrink:0,marginLeft:'4px'}}>Group</span>
            {[{k:'none',label:'None'},{k:'location',label:'Job'},{k:'category',label:'Type'},{k:'status',label:'Status'}].map(g => (
              <button key={g.k} onClick={() => setGroupBy(g.k)}
                style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',padding:'2px 7px',borderRadius:'4px',cursor:'pointer',
                  background: groupBy===g.k ? 'var(--asphalt-light)' : 'var(--asphalt)',
                  border: '1px solid '+(groupBy===g.k ? 'rgba(90,180,245,0.5)' : 'var(--asphalt-light)'),
                  color: groupBy===g.k ? '#5ab4f5' : 'var(--concrete-dim)',fontWeight: groupBy===g.k ? 700 : 400}}>
                {g.label}
              </button>
            ))}
          </div>
        </div>

        {/* List */}
        {(() => {
          const EqRow = ({ eq }) => {
            const st = statusInfo(eq.status);
            const isOpen = expanded === eq.id;
            return (
              <div style={{borderBottom:'1px solid var(--asphalt-light)'}}>
                <div onClick={() => { if (isOpen) setExpanded(null); else { setExpanded(eq.id); setNoteVal(eq.notes||''); } }}
                  style={{display:'flex',alignItems:'center',gap:'8px',padding:'8px 12px',cursor:'pointer',
                    background: isOpen ? 'rgba(245,197,24,0.04)' : 'transparent',transition:'background 0.12s'}}>
                  <span style={{fontSize:'14px',flexShrink:0}}>{TYPE_ICONS[eq.type]||'📦'}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:'10px',fontWeight:700,color:'var(--white)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{eq.name||eq.id}</div>
                    {eq.assignedJobName && <div style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',color:'#7ecb8f',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>📍 {eq.assignedJobName}</div>}
                    {eq.notes && !isOpen && <div style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',color:'rgba(155,148,136,0.5)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{eq.notes}</div>}
                  </div>
                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:'7px',fontWeight:700,padding:'2px 6px',borderRadius:'8px',
                    background:st.bg,color:st.color,border:'1px solid '+st.color+'44',flexShrink:0,whiteSpace:'nowrap'}}>{st.label}</span>
                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:'9px',color:'rgba(155,148,136,0.4)',flexShrink:0}}>{isOpen?'▲':'▾'}</span>
                </div>
                {isOpen && (
                  <div style={{padding:'8px 12px 12px',background:'rgba(245,197,24,0.03)',borderTop:'1px solid rgba(245,197,24,0.08)'}}>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',color:'rgba(155,148,136,0.6)',letterSpacing:'1px',textTransform:'uppercase',marginBottom:'5px'}}>Status</div>
                    <div style={{display:'flex',gap:'4px',flexWrap:'wrap',marginBottom:'10px'}}>
                      {STATUS_OPTS.map(opt => {
                        const active = (eq.status||'operational') === opt.value;
                        return (
                          <button key={opt.value} onClick={e => { e.stopPropagation(); saveItem(eq.id, {status:opt.value}); }}
                            style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',fontWeight:700,padding:'3px 9px',borderRadius:'10px',cursor:'pointer',
                              background:active?opt.color+'22':'var(--asphalt)',border:'1px solid '+(active?opt.color:'var(--asphalt-light)'),
                              color:active?opt.color:'var(--concrete-dim)',transition:'all 0.12s'}}>
                            {opt.label}
                          </button>
                        );
                      })}
                    </div>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',color:'rgba(155,148,136,0.6)',letterSpacing:'1px',textTransform:'uppercase',marginBottom:'5px'}}>Notes</div>
                    <textarea value={noteVal} onChange={e => setNoteVal(e.target.value)} onClick={e=>e.stopPropagation()}
                      placeholder="Add a note about this unit…" rows={2}
                      style={{width:'100%',boxSizing:'border-box',background:'var(--asphalt)',border:'1px solid var(--asphalt-light)',borderRadius:'5px',
                        color:'var(--white)',fontFamily:"'DM Mono',monospace",fontSize:'10px',padding:'6px 8px',resize:'vertical',outline:'none',lineHeight:'1.4'}} />
                    <button onClick={e => { e.stopPropagation(); saveItem(eq.id, {notes:noteVal}); }}
                      style={{marginTop:'6px',width:'100%',padding:'5px 0',background:'rgba(245,197,24,0.1)',border:'1px solid rgba(245,197,24,0.35)',
                        borderRadius:'5px',color:'var(--stripe)',fontFamily:"'DM Mono',monospace",fontSize:'9px',fontWeight:700,cursor:'pointer',opacity:saving===eq.id?0.6:1}}>
                      {saving===eq.id ? '✓ Saved' : '💾 Save Note'}
                    </button>
                  </div>
                )}
              </div>
            );
          };

          if (filtered.length === 0) return (
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:'10px',color:'rgba(155,148,136,0.4)',textAlign:'center',padding:'24px 0'}}>
              {items.length === 0 ? 'No fleet data — add equipment in the main app.' : 'No matches.'}
            </div>
          );

          if (groupedEntries) return (
            <div style={{overflowY:'auto',flex:1}}>
              {groupedEntries.map(([label, eqs]) => (
                <div key={label}>
                  <div style={{padding:'5px 12px 3px',background:'rgba(255,255,255,0.03)',borderBottom:'1px solid var(--asphalt-light)',
                    fontFamily:"'DM Mono',monospace",fontSize:'8px',color:'rgba(155,148,136,0.5)',letterSpacing:'1px',textTransform:'uppercase',display:'flex',justifyContent:'space-between'}}>
                    <span>{label}</span><span style={{color:'rgba(155,148,136,0.3)'}}>{eqs.length}</span>
                  </div>
                  {eqs.map(eq => <EqRow key={eq.id} eq={eq} />)}
                </div>
              ))}
            </div>
          );

          return <div style={{overflowY:'auto',flex:1}}>{filtered.map(eq => <EqRow key={eq.id} eq={eq} />)}</div>;
        })()}
      </>}
    </div>
  );
}

// ─── FLEET TAB ────────────────────────────────────────────────────────────────

function FleetTab({ gpsDevices, getDeviceName, getDeviceAddress, getDeviceStatus }) {
  const [statusFilter, setStatusFilter] = React.useState('all');
  const [groupBy,      setGroupBy]      = React.useState('location');
  const [search,       setSearch]       = React.useState('');

  const fleet = React.useMemo(() => {
    try { return JSON.parse(localStorage.getItem('dmc_fleet') || '[]').filter(e => e.active !== false); }
    catch(e) { return []; }
  }, []);

  const TYPE_ICONS = { paver:'🛣️', roller:'🛞', milling:'⛏️', excavator:'🦾', loader:'🔄',
    skid_steer:'🟡', compactor:'⚙️', dump_truck:'🚚', lowbed:'🚛', tack_truck:'🛢️', tack_wagon:'🛢️', rubber_machine:'🟠',
    water_truck:'💧', mtv:'🔁', grader:'🏗️', generator:'⚡', trailer:'🔗', other:'📦' };

  const statusInfo = (s) => {
    if (s === 'down')        return { label:'DOWN',        color:'#d94f3d', bg:'rgba(217,79,61,0.12)'   };
    if (s === 'limping')     return { label:'LIMPING',     color:'#e8813a', bg:'rgba(232,129,58,0.12)'  };
    if (s === 'maintenance') return { label:'MAINT.',      color:'#a05af0', bg:'rgba(160,90,240,0.12)'  };
    return                          { label:'OPERATIONAL', color:'#7ecb8f', bg:'rgba(61,158,106,0.10)'  };
  };

  const downCount  = fleet.filter(e => e.status === 'down').length;
  const limpCount  = fleet.filter(e => e.status === 'limping').length;
  const maintCount = fleet.filter(e => e.status === 'maintenance').length;
  const okCount    = fleet.filter(e => !e.status || !['down','limping','maintenance'].includes(e.status)).length;

  let filtered = statusFilter === 'all' ? fleet
    : statusFilter === 'operational' ? fleet.filter(e => !e.status || !['down','limping','maintenance'].includes(e.status))
    : fleet.filter(e => e.status === statusFilter);
  if (search.trim()) {
    const q = search.toLowerCase();
    filtered = filtered.filter(e =>
      (e.name||'').toLowerCase().includes(q) || (e.id||'').toLowerCase().includes(q) ||
      (e.assignedJobName||'').toLowerCase().includes(q) || (e.category||'').toLowerCase().includes(q));
  }

  const grouped = {};
  filtered.forEach(eq => {
    let g;
    if (groupBy === 'location')  g = eq.assignedJobName ? '📍 ' + eq.assignedJobName : '🏭 AT SHOP / YARD';
    else if (groupBy === 'category') g = eq.category ? eq.category.toUpperCase() : 'UNCATEGORIZED';
    else g = statusInfo(eq.status).label;
    if (!grouped[g]) grouped[g] = [];
    grouped[g].push(eq);
  });

  // Match a fleet unit to a GPS device by name
  const getGpsMatch = (eq) => {
    if (!gpsDevices || !gpsDevices.length) return null;
    const n = (eq.name || '').toLowerCase();
    return gpsDevices.find(d => {
      const dn = getDeviceName(d).toLowerCase();
      return dn === n || dn.includes(n) || n.includes(dn.split(' ')[0]);
    }) || null;
  };

  const Pill = ({ k, label, count, dot, activeColor, activeBg }) => (
    <button onClick={() => setStatusFilter(k)} style={{display:'inline-flex',alignItems:'center',gap:'5px',
      padding:'4px 11px',borderRadius:'20px',
      border:'1px solid '+(statusFilter===k ? activeColor : 'var(--asphalt-light)'),
      background:statusFilter===k ? activeBg : 'var(--asphalt)',
      color:statusFilter===k ? activeColor : 'var(--concrete-dim)',
      fontFamily:"'DM Mono',monospace",fontSize:'10px',fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}}>
      {dot && <span style={{width:'7px',height:'7px',borderRadius:'50%',background:dot,flexShrink:0}}></span>}
      {label}{count != null ? ` (${count})` : ''}
    </button>
  );

  const GbBtn = ({ k, label }) => (
    <button onClick={() => setGroupBy(k)} style={{flex:1,background:groupBy===k?'var(--asphalt-light)':'none',
      border:'none',borderRadius:'var(--radius)',padding:'4px 10px',cursor:'pointer',fontWeight:groupBy===k?700:400,
      color:groupBy===k?'var(--concrete)':'var(--concrete-dim)',fontFamily:"'DM Mono',monospace",fontSize:'9px'}}>
      {label}
    </button>
  );

  const EquipCard = ({ eq }) => {
    const st  = statusInfo(eq.status);

            ? <div style={{textAlign:'center',padding:'40px',fontFamily:"'DM Mono',monospace",fontSize:'11px',color:'var(--concrete-dim)'}}>No equipment matches your filter.</div>

                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:'8px'}}>
                  {items.map(eq => <EquipCard key={eq.id || eq.name} eq={eq} />)}
                </div>
              </div>
            ))
        }
      </div>
    </div>
  );
}

  // ── Conflict Resolution ────────────────────────────────────────────────────
  const [conflictModal, setConflictModal] = useState(null);
  const [showOverridden, setShowOverridden] = useState(false);
  // conflictModal: { type:'reassignEquip'|'reassignDriver', conflict, options }

  const detectPlanConflicts = (plan) => {
    const base = [...conflicts];
    if (!plan || !plan.jobs) return base;
    const detected = [];
    const allMoves = [];
    plan.jobs.forEach((job, ji) => {
      (job.moves || []).forEach((move, mi) => {
        if (move.overridden) return;
        allMoves.push({ jobName: job.jobName, jobNum: job.jobNum, jobIdx: ji, moveIdx: mi, move, date: job.date });
      });
    });
    // Equipment double-booking
    const eqMap = {};
    allMoves.forEach(entry => {
      (entry.move.equipment || []).forEach(eq => {
        const key = eq.name + '|' + entry.date;
        if (!eqMap[key]) eqMap[key] = [];
        eqMap[key].push(entry);
      });
    });
    Object.entries(eqMap).forEach(([key, entries]) => {
      if (entries.length > 1) {
        const parts = key.split('|');
        const eqName = parts[0]; const date = parts[1];
        detected.push({
          id: 'EQ-' + eqName.replace(/\s/g,'-') + '-' + date,
          severity: 'High', type: 'Equipment Double-Booked',
          desc: eqName + ' is assigned to multiple moves on ' + date + ': ' + entries.map(e => e.jobName + ' (move ' + (e.moveIdx+1) + ')').join(' and ') + '.',
          affectedJob: entries[0].jobName,
          resolution: 'Reassign equipment to a different unit for one of the moves.',
          _planConflict: true,
          _primaryMove: { jobIdx: entries[0].jobIdx, moveIdx: entries[0].moveIdx, date, eqName },
        });
      }
    });
    // Driver double-booking
    const drvMap = {};
    allMoves.forEach(entry => {
      if (!entry.move.assignedDriver) return;
      const key = entry.move.assignedDriver + '|' + entry.date;
      if (!drvMap[key]) drvMap[key] = [];
      drvMap[key].push(entry);
    });
    Object.entries(drvMap).forEach(([key, entries]) => {
      if (entries.length > 1) {
        const parts = key.split('|');
        const driverName = parts[0]; const date = parts[1];
        detected.push({
          id: 'DRV-' + driverName.replace(/\s/g,'-') + '-' + date,
          severity: 'High', type: 'Driver Double-Booked',
          desc: driverName + ' is assigned to multiple moves on ' + date + ': ' + entries.map(e => e.jobName + ' (move ' + (e.moveIdx+1) + ')').join(' and ') + '.',
          affectedJob: entries[0].jobName,
          resolution: 'Reassign one of the moves to a different driver.',
          _planConflict: true,
          _primaryMove: { jobIdx: entries[0].jobIdx, moveIdx: entries[0].moveIdx, date, driverName },
        });
      }
    });
    return [...detected, ...base];
  };

  const [planConflicts, setPlanConflicts] = useState(() => {
    try { return detectPlanConflicts(JSON.parse(localStorage.getItem('dmc_lowbed_plan')||'null')); } catch(e) { return [...conflicts]; }
  });

  const savePlanAndRefresh = (newPlan) => {
    localStorage.setItem('dmc_lowbed_plan', JSON.stringify(newPlan));
    setLowbedPlan(newPlan);
    setPlanConflicts(detectPlanConflicts(newPlan));
    hdFsSet('lowbed_plan', newPlan);
  };

  const deferMove = (conflict) => {
    if (!conflict._planConflict || !lowbedPlan) return;
    const pm = conflict._primaryMove;
    const plan = JSON.parse(JSON.stringify(lowbedPlan));
    const job = plan.jobs[pm.jobIdx];
    if (!job) return;
    const d = new Date(job.date + 'T12:00:00');

    }
  };

  const getAvailableEquipment = (conflict) => {
    if (!lowbedPlan || !conflict._primaryMove) return [];

      const eq = (move.equipment || []).find(e => e.name === pm.eqName);
      return eq ? eq.type : null;

    const assignedNames = new Set();

    return candidates;

    (lowbedPlan.jobs || []).forEach(job => {

    if (!lowbedPlan || !conflict._primaryMove) return;
    const pm = conflict._primaryMove;

  // ── Real jobs from main app localStorage ──

    paver:{loadClass:'heavy'}, roller:{loadClass:'medium',canPairWith:['roller','skid_steer','compactor','generator','trailer']},
    milling:{loadClass:'heavy'}, excavator:{loadClass:'heavy'}, loader:{loadClass:'medium',canPairWith:['skid_steer','trailer']},

  const checkCompat = (newType, existingItems) => {
    if (!existingItems.length) return { ok: true };
    const nr = LOWBED_RULES[newType] || { loadClass:'light', canPairWith:[] };
    if (nr.loadClass === 'heavy') return { ok: false, reason: 'This equipment requires the full lowbed — remove existing items first.' };
    if (nr.loadClass === 'skip')  return { ok: false, reason: 'Self-propelled equipment does not go on a lowbed.' };
    for (const item of existingItems) {
      const er = LOWBED_RULES[item.type] || { loadClass:'light', canPairWith:[] };
      if (er.loadClass === 'heavy') return { ok: false, reason: item.name+' fills the full lowbed — cannot add more.' };
      if (!(nr.canPairWith || []).includes(item.type)) return { ok: false, reason: newType+' is not compatible with '+item.type+' on the same load.' };

  // ── Real-time sync: lowbed chip assignments + equip name map ──────────────
  useEffect(() => {

    const accounts = (() => { try { return JSON.parse(localStorage.getItem('pavescope_accounts') || '[]'); } catch(e) { return []; } })();
    const u = (localStorage.getItem('dmc_u') || '').toLowerCase();
    const acct = accounts.find(a => (a.username||'').toLowerCase()===u||(a.email||'').toLowerCase()===u);
    const role = acct ? acct.role : null;
    const driverTypes = acct && Array.isArray(acct.driverTypes) ? acct.driverTypes : [];
    const isLowbedDriverRole = role === 'lowbed_driver' || (driverTypes && driverTypes.includes('lowbed'));
    const isRentalLowbedDriverRole = role === 'rental_lowbed_driver' || (driverTypes && driverTypes.includes('rental_lowbed'));
    const isForemanRole = role === 'foreman';

    const isAdmin = ['dj','dj@donmartincorp.com','donmartin','donmartin@donmartincorp.com'].includes(u);
    if (!(isAdmin || isLowbedDriverRole || isRentalLowbedDriverRole || isForemanRole || isMechanicRole)) return;

    // Load lowbed_groups: merge local + remote, keeping whichever has more total items,
    // then push the winner back to Firestore so all users converge on the same data
    hdFsGet('lowbed_groups').then(remote => {
      const localRaw = (() => { try { return JSON.parse(localStorage.getItem('dmc_lowbed_groups') || '[]'); } catch(e) { return []; }})();
      const remoteArr = Array.isArray(remote) ? remote : [];
      const countItems = arr => arr.reduce((n, g) => n + (g.items ? g.items.length : 0), 0);
      const winner = countItems(remoteArr) >= countItems(localRaw) ? remoteArr : localRaw;

  // ── Match live GPS positions to job site coordinates ──
  const matchDevicesToJobs = async (devices) => {
    const jobs = realJobs.length > 0 ? realJobs : [];
    if (!jobs.length || !devices.length) return;
    // Geocode each job address (results cached in localStorage by geocodeAddress)
    const geoCache = [];
    for (const job of jobs) {
      const addr = job.location || job.address || (job.gc && job.name ? `${job.name}` : null);
      if (!addr) continue;
      const coords = await geocodeAddress(addr);
      if (coords) geoCache.push({ coords, job });
    }
    const map = {};
    devices.forEach(dev => {
      const pt = dev.latest_device_point;
      if (!pt || !pt.lat || !pt.lng) return;
      const dLat = parseFloat(pt.lat), dLon = parseFloat(pt.lng);
      let bestJob = null, bestDist = Infinity;
      geoCache.forEach(({ coords, job }) => {
        const dist = haversineMiles(dLat, dLon, coords.lat, coords.lon);
        if (dist < bestDist) { bestDist = dist; bestJob = job; }
      });
      if (bestDist <= 0.5 && bestJob) {
        map[dev.device_id] = {
          jobId: bestJob.id,
          jobNum: bestJob.num || '',
          jobName: bestJob.name || '',
          distMiles: bestDist.toFixed(2)

Extract ALL of the following from this plan. Be precise with every number — these drive material ordering.

TOTAL PAVING AREA
— Total square footage and square yardage of all paving/surface treatment areas

SECTIONS / PHASES
— List each named section, phase, or area with its individual square footage

PAVEMENT DEPTH SPECIFICATION
— Depth per layer in inches (surface course, binder course, base course)
— Call out if multiple depths exist for different sections

MIX TYPES SPECIFIED
— Surface mix designation (e.g. S9.5B, I19B, B25)
— Any RAP or special mix notes

ESTIMATED TONNAGE
— Calculate tons per section using: (sq ft × depth in inches × 110 lbs) ÷ (12 × 2000)

QUANTITY TABLES

PROJECT INFO
— Project name, location, owner, engineer if shown on the plan

FLAGS
— Note any areas where measurements are unclear or assumptions were made`

        fileName: planFile.name,

      setPlanFile(null);

      // Run geo check for images only (skipped when geoEnabled is false)
      const geo = (isVideo || !geoEnabled) ? { noGps: !geoEnabled, onSite: geoEnabled ? null : true } : await checkPhotoLocation(f, jobAddress || null);
      return { name: f.name, type: f.type || 'image/jpeg', data, preview, isVideo, geo };

      jobName: job ? job.name : null,
      fileName: p.name,
      fileType: p.isVideo ? 'video' : 'image',
      date: new Date().toLocaleDateString(),
      thumbUrl: p.isVideo ? null : p.preview  // store preview for images only
    }));
    const updated = [...intelFiMedia, ...newEntries];
    setIntelFiMedia(updated);

${offSiteCount > 0 ? `Note: ${offSiteCount} photo(s) were excluded because GPS data placed them more than 0.5 miles from this job site.\n` : ''}${planRef ? `\nCivil plan analysis to cross-reference:\n---\n${planRef.analysis}\n---\n` : ''}

${planRef ? `— Comparison to plan: do visible conditions match the plan scope? Note any additions or reductions.\n` : ''}
SURFACE AREA REFINEMENT

MATERIAL QUANTITY ESTIMATE

${planRef ? `— Adjusted tonnage vs plan estimate: explain any difference\n` : ''}
EQUIPMENT STAGING & ACCESS

PHASING RECOMMENDATION

MIX RECOMMENDATION

— Any notes on tack coat, joint treatment, or special areas

Be specific, practical, and flag any uncertainties clearly.`;

      setIntelResults(updated);
      localStorage.setItem('hd_intel', JSON.stringify(updated.slice(0, 30)));
      setIntelPhotos([]);
      if (intelFileRef.current) intelFileRef.current.value = '';

              </div>

                <div style={{fontFamily:"'DM Mono',monospace",fontSize:'10px',color:'#5ab4f5',letterSpacing:'1px',textTransform:'uppercase',marginBottom:'10px'}}>

                      <div key={dev.device_id} style={{background:'rgba(90,180,245,0.04)',border:'1px solid rgba(90,180,245,0.14)',borderRadius:'6px',padding:'7px 12px',display:'flex',alignItems:'center',gap:'10px'}}>

            { id:'day',     color:'#0d4f7c', fontColor:'#000000' },
            { id:'night',   color:'#1a0a4a', fontColor:'#c8b8ff' },
            { id:'pending', color:'#5c4000', fontColor:'#f5c518' },
            { id:'blank',   color:'#1e1e1e', fontColor:'rgba(155,148,136,0.3)' },
          ];
          const _bt2 = (() => { try { return JSON.parse(localStorage.getItem('pavescope_blocktypes')||'null') || _defaultBT2; } catch(e) { return _defaultBT2; } })();
          const _btC2 = (type) => { const b = _bt2.find(x => x.id === type); return b ? { bg: b.color, font: b.fontColor } : { bg:'#1e1e1e', font:'rgba(155,148,136,0.3)' }; };

          // Build month dates
          const now = new Date();
          const baseYear  = now.getFullYear();
          const baseMonth = now.getMonth();
          const dispDate  = new Date(baseYear, baseMonth + schedMonthOffset, 1);
          const dYear  = dispDate.getFullYear();
          const dMonth = dispDate.getMonth();
          const monthLabel = dispDate.toLocaleDateString('en-US', { month:'long', year:'numeric' });
          const firstDow = dispDate.getDay(); // 0=Sun
          const daysInMonth = new Date(dYear, dMonth + 1, 0).getDate();
          const today2 = new Date(); today2.setHours(0,0,0,0);

          // Build week rows
          const cells = [];
          for (let i = 0; i < firstDow; i++) cells.push(null);
          for (let d = 1; d <= daysInMonth; d++) cells.push(new Date(dYear, dMonth, d));
          while (cells.length % 7 !== 0) cells.push(null);
          const weeks = [];
          for (let i = 0; i < cells.length; i += 7) weeks.push(cells.slice(i, i+7));

          const DAY_ABBR = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

          return (
            <div style={{background:'var(--asphalt)',minHeight:'calc(100vh - 120px)',padding:'14px'}}>
              {/* Read-only banner */}
              <div style={{background:'rgba(90,180,245,0.10)',border:'1px solid rgba(90,180,245,0.25)',borderRadius:'8px',padding:'6px 14px',marginBottom:'12px',display:'flex',alignItems:'center',gap:'8px'}}>

                <span style={{fontFamily:"'DM Mono',monospace",fontSize:'9px',color:'rgba(155,148,136,0.6)'}}>Schedule editing is managed by office staff</span>
              </div>

              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}}>
                <button onClick={() => setSchedMonthOffset(o => o-1)}
                  style={{background:'rgba(255,255,255,0.05)',border:'1px solid var(--asphalt-light)',borderRadius:'6px',color:'var(--concrete-dim)',fontFamily:"'DM Mono',monospace",fontSize:'12px',padding:'5px 14px',cursor:'pointer'}}>←</button>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'20px',letterSpacing:'3px',color:'var(--white)'}}>{monthLabel.toUpperCase()}</div>
                <button onClick={() => setSchedMonthOffset(o => o+1)}
                  style={{background:'rgba(255,255,255,0.05)',border:'1px solid var(--asphalt-light)',borderRadius:'6px',color:'var(--concrete-dim)',fontFamily:"'DM Mono',monospace",fontSize:'12px',padding:'5px 14px',cursor:'pointer'}}>→</button>
              </div>

              {/* Calendar grid */}
              <div style={{border:'1px solid var(--asphalt-light)',borderRadius:'10px',overflow:'hidden'}}>
                {/* Day headers */}
                <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',background:'var(--asphalt-mid)',borderBottom:'1px solid var(--asphalt-light)'}}>
                  {DAY_ABBR.map(d => (
                    <div key={d} style={{padding:'6px 4px',textAlign:'center',fontFamily:"'Bebas Neue',sans-serif",fontSize:'11px',letterSpacing:'2px',color:'var(--concrete-dim)'}}>{d}</div>
                  ))}
                </div>
                {/* Weeks */}
                {weeks.map((week, wi) => (
                  <div key={wi} style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',borderBottom: wi < weeks.length-1 ? '1px solid var(--asphalt-light)' : 'none'}}>
                    {week.map((date, di) => {
                      if (!date) return <div key={di} style={{background:'rgba(0,0,0,0.15)',borderRight: di < 6 ? '1px solid var(--asphalt-light)' : 'none'}} />;
                      const isWeekend = date.getDay() === 0 || date.getDay() === 6;
                      const isToday3 = date.getTime() === today2.getTime();
                      const key = date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0');
                      const sd = schedData[key] || {};
                      const topB = sd.top || { type: isWeekend ? 'blank' : 'blank', fields:{} };
                      const botB = sd.bot || { type: 'blank', fields:{} };
                      const extras = (sd.extras||[]).map(e => e.data).filter(Boolean);
                      const allBlocks = [topB, botB, ...extras].filter(b => b.type !== 'blank' || (b.fields && (b.fields.jobName||b.fields.jobNum)));
                      const topC = _btC2(topB.type);
                      const botC = _btC2(botB.type);
                      return (
                        <div key={di} style={{borderRight: di < 6 ? '1px solid var(--asphalt-light)' : 'none',background: isToday3 ? 'rgba(245,197,24,0.05)' : isWeekend ? 'rgba(0,0,0,0.1)' : 'transparent',minHeight:'90px',display:'flex',flexDirection:'column'}}>
                          {/* Date number */}
                          <div style={{padding:'4px 6px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                            <span style={{fontFamily:"'DM Mono',monospace",fontSize:'10px',fontWeight:700,color: isToday3 ? 'var(--stripe)' : isWeekend ? 'rgba(155,148,136,0.4)' : 'var(--concrete-dim)',background: isToday3 ? 'rgba(245,197,24,0.15)' : 'transparent',borderRadius:'3px',padding: isToday3 ? '0 4px' : '0'}}>{date.getDate()}</span>

                                <div style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',fontWeight:700,color:topC.font,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{topB.fields?.jobName||topB.fields?.jobNum||'—'}</div>
                                {topB.fields?.location && <div style={{fontFamily:"'DM Mono',monospace",fontSize:'7px',color: topC.font==='#000000'?'rgba(0,0,0,0.5)':'rgba(255,255,255,0.5)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>📍{topB.fields.location}</div>}
                              </div>
                            )}
                            {botB.type !== 'blank' && (
                              <div style={{background:botC.bg,borderRadius:'3px',padding:'2px 5px',border:'1px solid rgba(255,255,255,0.08)',opacity:0.9}}>
                                <div style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',fontWeight:700,color:botC.font,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{botB.fields?.jobName||botB.fields?.jobNum||'—'}</div>
                                {botB.fields?.location && <div style={{fontFamily:"'DM Mono',monospace",fontSize:'7px',color: botC.font==='#000000'?'rgba(0,0,0,0.5)':'rgba(255,255,255,0.5)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>📍{botB.fields.location}</div>}
                              </div>
                            )}
                            {extras.map((ex,ei) => {
                              const ec = _btC2(ex.type);
                              return ex.type !== 'blank' ? (
                                <div key={ei} style={{background:ec.bg,borderRadius:'3px',padding:'2px 5px',border:'1px solid rgba(255,255,255,0.08)',opacity:0.85}}>
                                  <div style={{fontFamily:"'DM Mono',monospace",fontSize:'8px',fontWeight:700,color:ec.font,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{ex.fields?.jobName||ex.fields?.jobNum||'—'}</div>
                                </div>
                              ) : null;
                            })}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                ))}
              </div>

              {/* Block type legend */}
              <div style={{display:'flex',gap:'12px',marginTop:'10px',flexWrap:'wrap'}}>
                {_bt2.filter(b => b.id !== 'blank').map(b => (
                  <div key={b.id} style={{display:'flex',alignItems:'center',gap:'5px'}}>
                    <div style={{width:'10px',height:'10px',borderRadius:'2px',background:b.color,border:'1px solid rgba(255,255,255,0.15)',flexShrink:0}}></div>
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:'9px',color:'var(--concrete-dim)',textTransform:'capitalize'}}>{b.id === 'day' ? 'Day Work' : b.id === 'night' ? 'Night Work' : 'Pending'}</span>
                  </div>
                ))}
              </div>
            </div>
          );
        })()}

        {/* ════ EQUIPMENT TAB ════ */}
        {tab === "Equipment" && (
          <FleetTab
            gpsDevices={gpsDevices}
            getDeviceName={getDeviceName}
            getDeviceAddress={getDeviceAddress}
            getDeviceStatus={getDeviceStatus}
          />

        {/* ════ DASHBOARD ════ */}
        {tab === "Dashboard" && (isDesktopUser || (!isDriverUser && !isMixTruckDriver)) && (

        {/* ── Mix Slip Form Modal ── */}

                    <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
                      {mixSlipForm.plant && <span style={{background:'rgba(245,197,24,0.08)',border:'1px solid rgba(245,197,24,0.2)',borderRadius:'6px',padding:'3px 9px',fontFamily:"'DM Mono',monospace",fontSize:'9px',color:'var(--stripe)'}}>🏭 {mixSlipForm.plant}</span>}
                      {mixSlipForm.material && <span style={{background:'rgba(90,180,245,0.08)',border:'1px solid rgba(90,180,245,0.2)',borderRadius:'6px',padding:'3px 9px',fontFamily:"'DM Mono',monospace",fontSize:'9px',color:'#5ab4f5'}}>🔵 {mixSlipForm.material}</span>}

                  <button onClick={() => setMixSlipForm(null)} style={{background:'none',border:'1px solid var(--asphalt-light)',borderRadius:'5px',color:'rgba(155,148,136,0.7)',fontFamily:"'DM Mono',monospace",fontSize:'10px',padding:'7px 16px',cursor:'pointer'}}>Cancel</button>
                  <button
                    onClick={() => {
                      if (!mixSlipDraft.loadTime && !mixSlipDraft.slipNumber) { alert('Add at least a load time or slip number.'); return; }
                      saveMixSlip({
                        id: 'ms_'+Date.now(),
                        driverUsername,
                        driverName: driverDisplay2,
                        date: mixSlipForm.dateKey,
                        jobName: mixSlipForm.jobName,
                        jobNum: mixSlipForm.jobNum,
                        plant: mixSlipForm.plant,

                      });
                      setMixSlipForm(null);

                    style={{background:'rgba(126,203,143,0.12)',border:'1px solid rgba(126,203,143,0.45)',borderRadius:'5px',color:'#7ecb8f',fontFamily:"'DM Mono',monospace",fontSize:'10px',fontWeight:700,padding:'7px 20px',cursor:'pointer'}}>
                    ✓ Submit Slip
