[build]
  publish = "."
  functions = "Netlify/Functions"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions."*"]
  timeout = 60

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.gstatic.com https://*.googleapis.com https://*.firebaseio.com https://*.firebase.com https://*.firebaseapp.com https://fonts.googleapis.com https://fonts.gstatic.com https://dmcapp.netlify.app https://*.netlify.app https://cdnjs.cloudflare.com https://*.openstreetmap.org https://unpkg.com https://cdn.tailwindcss.com data: blob:; frame-src 'self' https://track.onestepgps.com https://mail.donmartincorp.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://*.firebase.com https://dmcapp.netlify.app https://*.netlify.app https://*.railway.app https://track.onestepgps.com https://unpkg.com https://api.hover.to https://api.elevenlabs.io https://nominatim.openstreetmap.org; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.gstatic.com https://*.googleapis.com https://dmcapp.netlify.app https://*.netlify.app https://cdnjs.cloudflare.com https://apis.google.com https://unpkg.com https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.tailwindcss.com https://unpkg.com;"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://dmcapp.netlify.app"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
